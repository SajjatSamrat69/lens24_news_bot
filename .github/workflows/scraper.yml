name: 24-7 Free News Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Free Scraper Tools
        run: |
          pip install requests beautifulsoup4 groq lxml

      - name: Run Web Scraper Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python - << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          import os
          from groq import Groq

          disguise = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}
          url = "https://feedburner.com"
          
          try:
              page = requests.get(url, headers=disguise, timeout=15)
              soup = BeautifulSoup(page.content, 'xml')
              item = soup.find('item')
              
              if item:
                  raw_title = item.find('title').text.strip()
                  raw_desc = item.find('description').text.strip() if item.find('description') is not None else ""

                  client = Groq(api_key=os.environ.get("GROQ_API_KEY"))
                  completion = client.chat.completions.create(
                      model="llama-3.1-8b-instant",
                      messages=[{"role": "user", "content": f"You are a Bengali editor. Rewrite this title and summary into a unique, plagiarism-free news article body in beautiful native Bengali language. Title: {raw_title} Summary: {raw_desc}"}]
                  )
                  ai_response = completion.choices.message.content
                  
                  with open("live-news.xml", "w", encoding="utf-8") as f:
                      f.write(f'<?xml version="1.0" encoding="utf-8"?>\n<rss version="2.0">\n<channel>\n<title>Lens24 Live</title>\n<item>\n<title>{raw_title}</title>\n<description>{ai_response}</description>\n</item>\n</channel>\n</rss>')
                  print("Local feed updated successfully!")
          except Exception as e:
              print(f"System error: {e}")
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add live-news.xml
          git commit -m "Update live-news.xml feed [skip ci]" || exit 0
          git push
