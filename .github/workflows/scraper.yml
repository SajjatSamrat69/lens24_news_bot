name: 24/7 Free News Scraper

on:
  schedule:
    - cron: '0 * * * *' # Runs automatically every 1 hour, 24/7 for free
  workflow_dispatch: # Allows you to run it manually with a single click

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Free Scraper Tools
        run: |
          pip install requests beautifulsoup4 groq

      - name: Run Web Scraper Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BLOGGER_ACCESS_TOKEN: ${{ secrets.BLOGGER_ACCESS_TOKEN }}
        run: |
          python - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import os
          from groq import Groq

          disguise = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
          url = "https://thedailystar.net"
          
          try:
              page = requests.get(url, headers=disguise, timeout=15)
              soup = BeautifulSoup(page.content, 'html.parser')
              
              # Automatically hunts for the biggest headline anchor
              headline_element = soup.find('h1') or soup.find('h2') or soup.find(class_='title')
              if headline_element:
                  raw_headline = headline_element.text.strip()
                  print(f"Scraped popular headline: {raw_headline}")

                  # Connects to your free Groq AI module to translate and rewrite
                  client = Groq(api_key=os.environ.get("GROQ_API_KEY"))
                  completion = client.chat.completions.create(
                      model="llama-3.1-8b-instant",
                      messages=[{"role": "user", "content": f"You are a professional Bengali journalist. Translate and rewrite this news headline into unique, engaging, plagiarism-free Bengali news text for a blog post body. Do not include English words: {raw_headline}"}]
                  )
                  ai_response = completion.choices.message.content
                  
                  # Formats the final submission payload data
                  blog_id = "YOUR_BLOGGER_ID_HERE"
                  blogger_url = f"https://googleapis.com{blog_id}/posts/"
                  payload = {
                      "kind": "blogger#post",
                      "title": ai_response[:60] + "...",
                      "content": f"<p>{ai_response}</p><br><p>সংবাদ উৎস: {url}</p>",
                      "labels": ["জাতীয়"]
                  }
                  headers = {"Authorization": f"Bearer {os.environ.get('BLOGGER_ACCESS_TOKEN')}"}
                  res = requests.post(blogger_url, json=payload, headers=headers)
                  print(f"Blogger server code response: {res.status_code}")
          except Exception as e:
              print(f"System error: {e}")
          EOF
